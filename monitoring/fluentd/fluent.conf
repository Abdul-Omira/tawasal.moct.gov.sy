<source>
  @type tail
  @id in_tail_application
  path /var/log/ministry-platform/application.log
  pos_file /var/log/fluentd/application.log.pos
  tag application.*
  format json
  time_key timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
</source>

<source>
  @type tail
  @id in_tail_access
  path /var/log/ministry-platform/access.log
  pos_file /var/log/fluentd/access.log.pos
  tag access.*
  format apache2
  time_key time
  time_format %d/%b/%Y:%H:%M:%S %z
</source>

<source>
  @type tail
  @id in_tail_error
  path /var/log/ministry-platform/error.log
  pos_file /var/log/fluentd/error.log.pos
  tag error.*
  format json
  time_key timestamp
  time_format %Y-%m-%dT%H:%M:%S.%L%z
</source>

<filter application.**>
  @type record_transformer
  <record>
    service "ministry-platform"
    environment "#{ENV['NODE_ENV'] || 'development'}"
  </record>
</filter>

<filter access.**>
  @type record_transformer
  <record>
    service "ministry-platform"
    environment "#{ENV['NODE_ENV'] || 'development'}"
    log_type "access"
  </record>
</filter>

<filter error.**>
  @type record_transformer
  <record>
    service "ministry-platform"
    environment "#{ENV['NODE_ENV'] || 'development'}"
    log_type "error"
    severity "error"
  </record>
</filter>

<match application.**>
  @type elasticsearch
  @id out_es_application
  @log_level info
  include_tag_key true
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  path ""
  scheme "#{ENV['ELASTICSEARCH_SCHEME'] || 'http'}"
  index_name ministry-platform-application
  type_name _doc
  <buffer>
    @type file
    path /var/log/fluentd/buffers/application
    flush_mode interval
    retry_type exponential_backoff
    flush_thread_count 2
    flush_interval 5s
    retry_forever
    retry_max_interval 30
    chunk_limit_size 2M
    queue_limit_length 8
    overflow_action block
  </buffer>
</match>

<match access.**>
  @type elasticsearch
  @id out_es_access
  @log_level info
  include_tag_key true
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  path ""
  scheme "#{ENV['ELASTICSEARCH_SCHEME'] || 'http'}"
  index_name ministry-platform-access
  type_name _doc
  <buffer>
    @type file
    path /var/log/fluentd/buffers/access
    flush_mode interval
    retry_type exponential_backoff
    flush_thread_count 2
    flush_interval 5s
    retry_forever
    retry_max_interval 30
    chunk_limit_size 2M
    queue_limit_length 8
    overflow_action block
  </buffer>
</match>

<match error.**>
  @type elasticsearch
  @id out_es_error
  @log_level info
  include_tag_key true
  host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['ELASTICSEARCH_PORT'] || '9200'}"
  path ""
  scheme "#{ENV['ELASTICSEARCH_SCHEME'] || 'http'}"
  index_name ministry-platform-error
  type_name _doc
  <buffer>
    @type file
    path /var/log/fluentd/buffers/error
    flush_mode interval
    retry_type exponential_backoff
    flush_thread_count 2
    flush_interval 5s
    retry_forever
    retry_max_interval 30
    chunk_limit_size 2M
    queue_limit_length 8
    overflow_action block
  </buffer>
</match>

# Prometheus metrics for Fluentd
<source>
  @type monitor_agent
  @id in_monitor_agent
  bind 0.0.0.0
  port 24220
</source>

<source>
  @type prometheus
  @id in_prometheus
  bind 0.0.0.0
  port 24231
  metrics_path /metrics
</source>
