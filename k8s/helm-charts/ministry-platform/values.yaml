# Default values for ministry-platform
# This is a YAML-formatted file.

replicaCount: 3

image:
  repository: ministry-platform
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: true
  className: "istio"
  annotations:
    kubernetes.io/ingress.class: istio
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: ministry-platform.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ministry-platform-tls
      hosts:
        - ministry-platform.local

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables
env:
  NODE_ENV: "production"
  PORT: "5000"
  TZ: "Asia/Damascus"

# Secrets (these should be set via external secrets or sealed secrets)
secrets:
  DB_PASSWORD: ""
  REDIS_PASSWORD: ""
  SESSION_SECRET: ""
  JWT_SECRET: ""
  FILE_ACCESS_SECRET: ""
  ADMIN_PASSWORD: ""
  EMPLOYEE_PASSWORD: ""
  GRAFANA_PASSWORD: ""

# Persistent volumes
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteMany
  size: 10Gi

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: ""
    database: "ministry_communication"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

# Redis configuration
redis:
  enabled: true
  auth:
    enabled: true
    password: ""
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# Monitoring configuration
monitoring:
  enabled: true
  prometheus:
    enabled: true
    server:
      persistentVolume:
        enabled: true
        size: 10Gi
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
  grafana:
    enabled: true
    adminPassword: ""
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

# Istio configuration
istio:
  enabled: true
  gateway:
    enabled: true
    hosts:
      - ministry-platform.local
    tls:
      enabled: true
      secretName: ministry-platform-tls

# Backup configuration
backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: "7d"
  storage:
    enabled: true
    size: 20Gi

# Security configuration
security:
  podSecurityPolicy:
    enabled: true
  networkPolicy:
    enabled: true
  serviceAccount:
    create: true
    annotations: {}
