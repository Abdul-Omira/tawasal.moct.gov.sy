apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ministry-platform.fullname" . }}-secrets
  labels:
    {{- include "ministry-platform.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ .Values.secrets.DB_PASSWORD | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.REDIS_PASSWORD | b64enc | quote }}
  SESSION_SECRET: {{ .Values.secrets.SESSION_SECRET | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | b64enc | quote }}
  FILE_ACCESS_SECRET: {{ .Values.secrets.FILE_ACCESS_SECRET | b64enc | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.ADMIN_PASSWORD | b64enc | quote }}
  EMPLOYEE_PASSWORD: {{ .Values.secrets.EMPLOYEE_PASSWORD | b64enc | quote }}
  GRAFANA_PASSWORD: {{ .Values.secrets.GRAFANA_PASSWORD | b64enc | quote }}
