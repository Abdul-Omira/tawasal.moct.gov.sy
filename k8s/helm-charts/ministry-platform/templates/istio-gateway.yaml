{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: {{ include "ministry-platform.fullname" . }}-gateway
  labels:
    {{- include "ministry-platform.labels" . | nindent 4 }}
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
  {{- if .Values.istio.gateway.tls.enabled }}
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: {{ .Values.istio.gateway.tls.secretName }}
    hosts:
    {{- range .Values.istio.gateway.hosts }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ include "ministry-platform.fullname" . }}-vs
  labels:
    {{- include "ministry-platform.labels" . | nindent 4 }}
spec:
  hosts:
  - "*"
  gateways:
  - {{ include "ministry-platform.fullname" . }}-gateway
  http:
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: {{ include "ministry-platform.fullname" . }}
        port:
          number: {{ .Values.service.port }}
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: {{ include "ministry-platform.fullname" . }}
        port:
          number: {{ .Values.service.port }}
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ include "ministry-platform.fullname" . }}-dr
  labels:
    {{- include "ministry-platform.labels" . | nindent 4 }}
spec:
  host: {{ include "ministry-platform.fullname" . }}
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 10
        maxRequestsPerConnection: 2
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
{{- end }}
