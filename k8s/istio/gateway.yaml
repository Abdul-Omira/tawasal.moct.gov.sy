apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: ministry-platform-gateway
  namespace: ministry-platform
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: ministry-platform-tls
    hosts:
    - "ministry-platform.local"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: ministry-platform-vs
  namespace: ministry-platform
spec:
  hosts:
  - "*"
  gateways:
  - ministry-platform-gateway
  http:
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: ministry-platform-service
        port:
          number: 80
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: ministry-platform-service
        port:
          number: 80
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: ministry-platform-dr
  namespace: ministry-platform
spec:
  host: ministry-platform-service
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 10
        maxRequestsPerConnection: 2
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
