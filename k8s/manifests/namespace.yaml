apiVersion: v1
kind: Namespace
metadata:
  name: ministry-platform
  labels:
    name: ministry-platform
    app: ministry-platform
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ministry-platform-quota
  namespace: ministry-platform
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    persistentvolumeclaims: "10"
    pods: "20"
    services: "10"
    secrets: "20"
    configmaps: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ministry-platform-limits
  namespace: ministry-platform
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
